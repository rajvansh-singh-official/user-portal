{% extends "base.html" %}
{% load static %}

{% block title %}
Edit User
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/base.css' %}">
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block body %}

<div class="auth-wrap">

    <div class="visual">
        <div class="visual-content">
            <span class="brand-mark">UP</span>
            <div class="visual-text">
                <h1>Edit user.</h1>
                <p>Update {{ editing_user.username }}'s account details.</p>
            </div>
        </div>
    </div>

    <div class="form-side">
        <div class="form-box">

            <h2>Edit User</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="field-group">
                    <label>Username</label>
                    <input type="text" name="username" value="{{ editing_user.username }}">
                </div>

                <div class="field-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ editing_user.email }}">
                </div>

                <button type="submit" class="submit-btn">Save changes</button>
            </form>

            <p class="switch-text">
                <a href="/">Back to dashboard</a>
            </p>

        </div>
    </div>

</div>

{% endblock %}

{% block js %}
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
